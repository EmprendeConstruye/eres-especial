<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo – Eres Especial</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:#f5f0eb; --blush:#e8c4b8; --rose:#c4856a;
      --wine:#7a3d3d; --dark:#2a1a1a; --light:#faf7f4;
      --text:#4a3030; --gray:#9e8888;
    }
    body { font-family:'Jost',sans-serif; background:var(--light); color:var(--text); }

    /* NAV */
    nav {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 5%; background:rgba(250,247,244,.95);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(196,133,106,.2);
      box-shadow:0 2px 20px rgba(122,61,61,.06);
    }
    .nav-logo {
      font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600;
      color:var(--wine); text-decoration:none; letter-spacing:.04em;
    }
    .nav-logo span { font-style:italic; font-weight:300; }
    .nav-icons { display:flex; gap:1rem; }
    .nav-icons button, .nav-icons a {
      background:none; border:none; cursor:pointer; font-size:1.1rem;
      color:var(--text); text-decoration:none; transition:color .2s;
    }
    .nav-icons button:hover, .nav-icons a:hover { color:var(--rose); }

    /* PAGE HEADER */
    .page-header {
      background:linear-gradient(135deg,var(--cream) 60%,var(--blush) 100%);
      padding:50px 5% 40px; text-align:center;
    }
    .breadcrumb { font-size:.72rem; letter-spacing:.12em; color:var(--gray); margin-bottom:1rem; }
    .breadcrumb a { color:var(--rose); text-decoration:none; }
    .page-title {
      font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,4vw,3rem);
      font-weight:300; color:var(--dark);
    }

    /* LAYOUT */
    .catalog-layout {
      display:grid; grid-template-columns:260px 1fr;
      gap:2rem; padding:40px 5%; align-items:start;
    }

    /* SIDEBAR */
    .sidebar { position:sticky; top:80px; }
    .filter-section { margin-bottom:2rem; }
    .filter-title {
      font-size:.72rem; letter-spacing:.16em; text-transform:uppercase;
      color:var(--wine); margin-bottom:1rem; padding-bottom:.5rem;
      border-bottom:1px solid var(--blush);
    }
    .filter-options { display:flex; flex-direction:column; gap:.6rem; }
    .filter-options label {
      display:flex; align-items:center; gap:.6rem;
      font-size:.88rem; cursor:pointer; color:var(--text);
    }
    .filter-options input[type=checkbox] { accent-color:var(--rose); }

    .price-range { display:flex; flex-direction:column; gap:.5rem; }
    .price-range input[type=range] {
      accent-color:var(--rose); width:100%;
    }
    .price-labels { display:flex; justify-content:space-between; font-size:.78rem; color:var(--gray); }

    .size-grid { display:flex; flex-wrap:wrap; gap:.5rem; }
    .size-btn {
      padding:6px 14px; border:1.5px solid var(--blush);
      background:none; cursor:pointer; font-size:.78rem;
      color:var(--text); transition:all .2s;
    }
    .size-btn:hover, .size-btn.active { border-color:var(--wine); background:var(--wine); color:#fff; }

    .btn-clear {
      width:100%; padding:10px; background:none; border:1.5px solid var(--blush);
      color:var(--gray); font-size:.78rem; letter-spacing:.1em;
      text-transform:uppercase; cursor:pointer; transition:all .2s; margin-top:.5rem;
    }
    .btn-clear:hover { border-color:var(--rose); color:var(--rose); }

    /* MAIN AREA */
    .catalog-main {}
    .catalog-toolbar {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.5rem; flex-wrap:wrap; gap:.8rem;
    }
    .result-count { font-size:.85rem; color:var(--gray); }
    .sort-select {
      padding:8px 16px; border:1.5px solid var(--blush);
      background:var(--light); color:var(--text);
      font-family:'Jost',sans-serif; font-size:.82rem; cursor:pointer;
    }

    .view-toggle { display:flex; gap:.3rem; }
    .view-btn {
      background:none; border:1.5px solid var(--blush);
      width:34px; height:34px; cursor:pointer; font-size:.9rem;
      transition:all .2s; display:flex; align-items:center; justify-content:center;
    }
    .view-btn.active { border-color:var(--wine); background:var(--wine); color:#fff; }

    /* PRODUCT GRID */
    .prod-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:1.5rem;
    }
    .prod-grid.list-view { grid-template-columns:1fr; }
    .prod-grid.list-view .prod-card { display:flex; }
    .prod-grid.list-view .prod-img { width:180px; flex-shrink:0; aspect-ratio:auto; height:220px; }
    .prod-grid.list-view .prod-info { flex:1; }

    .prod-card {
      background:#fff; cursor:pointer;
      transition:transform .3s, box-shadow .3s;
    }
    .prod-card:hover { transform:translateY(-5px); box-shadow:0 12px 32px rgba(122,61,61,.1); }
    .prod-img {
      aspect-ratio:3/4; background:linear-gradient(135deg,var(--blush) 0%,var(--cream) 100%);
      display:flex; align-items:center; justify-content:center;
      font-size:4rem; position:relative; overflow:hidden;
    }
    .prod-badge {
      position:absolute; top:10px; left:10px; background:var(--wine);
      color:#fff; font-size:.62rem; letter-spacing:.1em;
      padding:3px 9px; text-transform:uppercase;
    }
    .prod-wish {
      position:absolute; top:8px; right:10px;
      background:#fff; border:none; cursor:pointer;
      width:30px; height:30px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:.9rem; color:var(--gray); transition:color .2s;
    }
    .prod-wish:hover, .prod-wish.active { color:var(--rose); }
    .prod-info { padding:14px 16px 18px; }
    .prod-cat { font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--rose); margin-bottom:.3rem; }
    .prod-name { font-family:'Cormorant Garamond',serif; font-size:1.05rem; color:var(--dark); margin-bottom:.3rem; }
    .prod-sizes { font-size:.68rem; color:var(--gray); letter-spacing:.06em; margin-bottom:.7rem; }
    .prod-price { font-size:.95rem; font-weight:500; color:var(--wine); }
    .prod-price s { font-weight:300; color:var(--gray); margin-left:.4rem; font-size:.8rem; }
    .prod-add {
      width:100%; margin-top:10px; padding:9px;
      background:var(--dark); color:#fff; border:none; cursor:pointer;
      font-family:'Jost',sans-serif; font-size:.7rem; letter-spacing:.14em;
      text-transform:uppercase; transition:background .2s;
    }
    .prod-add:hover { background:var(--wine); }

    /* PAGINATION */
    .pagination {
      display:flex; justify-content:center; align-items:center;
      gap:.5rem; margin-top:3rem;
    }
    .page-btn {
      width:38px; height:38px; border:1.5px solid var(--blush);
      background:none; cursor:pointer; font-size:.85rem;
      color:var(--text); transition:all .2s;
    }
    .page-btn.active { background:var(--wine); border-color:var(--wine); color:#fff; }
    .page-btn:hover:not(.active) { border-color:var(--rose); color:var(--rose); }

    /* WA */
    .wa-btn {
      position:fixed; bottom:28px; right:28px; z-index:99;
      width:54px; height:54px; background:#25D366; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.5rem; text-decoration:none;
      box-shadow:0 6px 20px rgba(37,211,102,.4);
    }

    /* MOBILE */
    .filter-toggle {
      display:none; width:100%; padding:12px;
      background:var(--wine); color:#fff; border:none; cursor:pointer;
      font-family:'Jost',sans-serif; font-size:.8rem; letter-spacing:.1em;
      text-transform:uppercase; margin-bottom:1rem;
    }
    @media(max-width:900px){
      .catalog-layout { grid-template-columns:1fr; }
      .sidebar { position:static; }
      .filter-toggle { display:block; }
      .sidebar-inner { display:none; }
      .sidebar-inner.open { display:block; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Eres <span>Especial</span></a>
  <div class="nav-icons">
    <button title="Buscar">🔍</button>
    <button title="Favoritos">♡</button>
    <button title="Carrito">🛍</button>
    <button title="Cuenta" onclick="location.href='login.html'">👤</button>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="index.html">Inicio</a> › Catálogo</div>
  <h1 class="page-title">Toda la colección</h1>
</div>

<div class="catalog-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="filter-toggle" onclick="document.querySelector('.sidebar-inner').classList.toggle('open')">
      ☰ Filtros
    </button>
    <div class="sidebar-inner" id="sidebarInner">

      <div class="filter-section">
        <div class="filter-title">Categorías</div>
        <div class="filter-options">
          <label><input type="checkbox" checked/> Todos los productos</label>
          <label><input type="checkbox"/> Vestidos (24)</label>
          <label><input type="checkbox"/> Blusas (18)</label>
          <label><input type="checkbox"/> Pantalones (15)</label>
          <label><input type="checkbox"/> Conjuntos (12)</label>
          <label><input type="checkbox"/> Faldas (9)</label>
          <label><input type="checkbox"/> Accesorios (6)</label>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title">Precio</div>
        <div class="price-range">
          <input type="range" min="0" max="300000" value="300000" id="priceRange"
            oninput="document.getElementById('priceVal').textContent='$'+Number(this.value).toLocaleString()"/>
          <div class="price-labels">
            <span>$0</span>
            <span id="priceVal">$300.000</span>
          </div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title">Tallas</div>
        <div class="size-grid">
          <button class="size-btn" onclick="this.classList.toggle('active')">XS</button>
          <button class="size-btn" onclick="this.classList.toggle('active')">S</button>
          <button class="size-btn active" onclick="this.classList.toggle('active')">M</button>
          <button class="size-btn" onclick="this.classList.toggle('active')">L</button>
          <button class="size-btn" onclick="this.classList.toggle('active')">XL</button>
          <button class="size-btn" onclick="this.classList.toggle('active')">2XL</button>
          <button class="size-btn" onclick="this.classList.toggle('active')">3XL</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title">Colores</div>
        <div class="filter-options">
          <label><input type="checkbox"/> Negro</label>
          <label><input type="checkbox"/> Blanco / Crema</label>
          <label><input type="checkbox"/> Rosa / Blush</label>
          <label><input type="checkbox"/> Vino / Burdeo</label>
          <label><input type="checkbox"/> Beige / Nude</label>
          <label><input type="checkbox"/> Estampado</label>
        </div>
      </div>

      <button class="btn-clear">✕ Limpiar filtros</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="catalog-main">
    <div class="catalog-toolbar">
      <span class="result-count" id="resultCount">Mostrando 12 productos</span>
      <div style="display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;">
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" title="Cuadrícula" onclick="setView('grid')">⊞</button>
          <button class="view-btn" id="listBtn" title="Lista" onclick="setView('list')">☰</button>
        </div>
        <select class="sort-select" onchange="sortProducts(this.value)">
          <option value="newest">Más nuevos</option>
          <option value="price-asc">Menor precio</option>
          <option value="price-desc">Mayor precio</option>
          <option value="popular">Más populares</option>
        </select>
      </div>
    </div>

    <div class="prod-grid" id="productGrid"></div>

    <div class="pagination">
      <button class="page-btn">‹</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">›</button>
    </div>
  </main>
</div>

<a href="https://wa.me/1234567890" class="wa-btn" target="_blank">💬</a>

<script>
const products = [
  { name:'Vestido Floral Rosa',   cat:'Vestidos',   price:85000, old:110000, sizes:'S · M · L',    emoji:'👗', badge:'Nuevo' },
  { name:'Blusa Encaje Crema',    cat:'Blusas',     price:48000, old:0,      sizes:'XS · S · M',   emoji:'👚', badge:'' },
  { name:'Conjunto Lino Beige',   cat:'Conjuntos',  price:95000, old:120000, sizes:'S · M · L',    emoji:'🎽', badge:'Oferta' },
  { name:'Vestido Midi Negro',    cat:'Vestidos',   price:72000, old:0,      sizes:'S · M · L · XL',emoji:'🖤', badge:'' },
  { name:'Falda Plisada Rosa',    cat:'Faldas',     price:52000, old:0,      sizes:'XS · S · M',   emoji:'👘', badge:'Nuevo' },
  { name:'Blusa Seda Champagne',  cat:'Blusas',     price:65000, old:80000,  sizes:'S · M · L',    emoji:'✨', badge:'Oferta' },
  { name:'Pantalón Wide Leg',     cat:'Pantalones', price:78000, old:0,      sizes:'S · M · L · XL',emoji:'👖', badge:'' },
  { name:'Vestido Wrap Floral',   cat:'Vestidos',   price:90000, old:115000, sizes:'XS-3XL',       emoji:'🌸', badge:'Top' },
  { name:'Blusa Cropped Bordado', cat:'Blusas',     price:44000, old:0,      sizes:'S · M',        emoji:'💐', badge:'' },
  { name:'Conjunto Formal Vino',  cat:'Conjuntos',  price:115000,old:0,     sizes:'S · M · L',    emoji:'🍷', badge:'Nuevo' },
  { name:'Vestido Camisero',      cat:'Vestidos',   price:68000, old:85000,  sizes:'S · M · L · XL',emoji:'👗', badge:'Oferta' },
  { name:'Falda Midi Satén',      cat:'Faldas',     price:58000, old:0,      sizes:'XS · S · M · L',emoji:'🌙', badge:'' },
];

let currentView = 'grid';

function renderProducts(prods) {
  const grid = document.getElementById('productGrid');
  document.getElementById('resultCount').textContent = `Mostrando ${prods.length} productos`;
  grid.innerHTML = prods.map(p => `
    <div class="prod-card" onclick="location.href='producto.html'">
      <div class="prod-img">
        ${p.badge ? `<span class="prod-badge">${p.badge}</span>` : ''}
        <button class="prod-wish" onclick="event.stopPropagation();this.classList.toggle('active')">♡</button>
        <span style="font-size:${currentView==='list'?'3rem':'4rem'}">${p.emoji}</span>
      </div>
      <div class="prod-info">
        <div class="prod-cat">${p.cat}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-sizes">Tallas: ${p.sizes}</div>
        <div class="prod-price">$${p.price.toLocaleString()} ${p.old ? `<s>$${p.old.toLocaleString()}</s>` : ''}</div>
        <button class="prod-add" onclick="event.stopPropagation()">Agregar al carrito</button>
      </div>
    </div>`).join('');
}

function setView(v) {
  currentView = v;
  const grid = document.getElementById('productGrid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
  document.getElementById('listBtn').classList.toggle('active', v === 'list');
  renderProducts(products);
}

function sortProducts(val) {
  let sorted = [...products];
  if (val === 'price-asc')  sorted.sort((a,b) => a.price - b.price);
  if (val === 'price-desc') sorted.sort((a,b) => b.price - a.price);
  if (val === 'newest')     sorted.reverse();
  renderProducts(sorted);
}

// Init
renderProducts(products);
// On desktop show sidebar
if (window.innerWidth > 900) document.getElementById('sidebarInner').classList.add('open');
</script>
