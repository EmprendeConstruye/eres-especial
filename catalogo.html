<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo – Eres Especial</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#f5f0eb;--blush:#e8c4b8;--rose:#c4856a;--wine:#7a3d3d;--dark:#2a1a1a;--light:#faf7f4;--text:#4a3030;--gray:#9e8888}
    body{font-family:'Jost',sans-serif;background:var(--light);color:var(--text)}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 5%;background:rgba(250,247,244,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(196,133,106,.2);box-shadow:0 2px 20px rgba(122,61,61,.06)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--wine);text-decoration:none;letter-spacing:.04em}
    .nav-logo span{font-style:italic;font-weight:300}
    .nav-icons{display:flex;gap:1rem}
    .nav-icons button{background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text);transition:color .2s}
    .nav-icons button:hover{color:var(--rose)}
    .page-header{background:linear-gradient(135deg,var(--cream) 60%,var(--blush) 100%);padding:50px 5% 40px;text-align:center}
    .breadcrumb{font-size:.72rem;letter-spacing:.12em;color:var(--gray);margin-bottom:1rem}
    .breadcrumb a{color:var(--rose);text-decoration:none}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:300;color:var(--dark)}
    .catalog-layout{display:grid;grid-template-columns:260px 1fr;gap:2rem;padding:40px 5%;align-items:start}
    .sidebar{position:sticky;top:80px}
    .filter-section{margin-bottom:2rem}
    .filter-title{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--blush)}
    .filter-options{display:flex;flex-direction:column;gap:.6rem}
    .filter-options label{display:flex;align-items:center;gap:.6rem;font-size:.88rem;cursor:pointer}
    .filter-options input[type=radio]{accent-color:var(--rose)}
    .price-range{display:flex;flex-direction:column;gap:.5rem}
    .price-range input[type=range]{accent-color:var(--rose);width:100%}
    .price-labels{display:flex;justify-content:space-between;font-size:.78rem;color:var(--gray)}
    .size-grid{display:flex;flex-wrap:wrap;gap:.5rem}
    .size-btn{padding:6px 14px;border:1.5px solid var(--blush);background:none;cursor:pointer;font-size:.78rem;color:var(--text);transition:all .2s}
    .size-btn:hover,.size-btn.active{border-color:var(--wine);background:var(--wine);color:#fff}
    .btn-clear{width:100%;padding:10px;background:none;border:1.5px solid var(--blush);color:var(--gray);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:.5rem}
    .btn-clear:hover{border-color:var(--rose);color:var(--rose)}
    .filter-toggle{display:none;width:100%;padding:12px;background:var(--wine);color:#fff;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}
    .catalog-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.8rem}
    .result-count{font-size:.85rem;color:var(--gray)}
    .sort-select{padding:8px 16px;border:1.5px solid var(--blush);background:var(--light);color:var(--text);font-family:'Jost',sans-serif;font-size:.82rem;cursor:pointer}
    .view-toggle{display:flex;gap:.3rem}
    .view-btn{background:none;border:1.5px solid var(--blush);width:34px;height:34px;cursor:pointer;font-size:.9rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
    .view-btn.active{border-color:var(--wine);background:var(--wine);color:#fff}
    .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.5rem}
    .prod-grid.list-view{grid-template-columns:1fr}
    .prod-grid.list-view .prod-card{display:flex}
    .prod-grid.list-view .prod-img{width:180px;flex-shrink:0;height:220px;aspect-ratio:auto}
    .prod-card{background:#fff;cursor:pointer;transition:transform .3s,box-shadow .3s}
    .prod-card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(122,61,61,.1)}
    .prod-img{aspect-ratio:3/4;background:linear-gradient(135deg,var(--blush) 0%,var(--cream) 100%);display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative;overflow:hidden}
    .prod-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .prod-img .placeholder{font-size:4rem}
    .prod-badge{position:absolute;top:10px;left:10px;background:var(--wine);color:#fff;font-size:.62rem;letter-spacing:.1em;padding:3px 9px;text-transform:uppercase;z-index:1}
    .prod-wish{position:absolute;top:8px;right:10px;background:#fff;border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--gray);transition:color .2s;z-index:1}
    .prod-wish:hover,.prod-wish.active{color:var(--rose)}
    .prod-info{padding:14px 16px 18px;flex:1}
    .prod-cat{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);margin-bottom:.3rem}
    .prod-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--dark);margin-bottom:.3rem}
    .prod-sizes{font-size:.68rem;color:var(--gray);letter-spacing:.06em;margin-bottom:.7rem}
    .prod-price{font-size:.95rem;font-weight:500;color:var(--wine)}
    .prod-price s{font-weight:300;color:var(--gray);margin-left:.4rem;font-size:.8rem}
    .prod-add{width:100%;margin-top:10px;padding:9px;background:var(--dark);color:#fff;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;transition:background .2s}
    .prod-add:hover{background:var(--wine)}
    .skeleton{background:linear-gradient(90deg,var(--blush) 25%,var(--cream) 50%,var(--blush) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-card{background:#fff}
    .skel-img{aspect-ratio:3/4}
    .skel-line{height:14px;margin:12px 18px 6px;border-radius:2px}
    .skel-line.short{width:60%}
    .empty-state{text-align:center;padding:60px 20px;color:var(--gray);grid-column:1/-1}
    .empty-state .e-icon{font-size:3rem;margin-bottom:1rem}
    .empty-state p{font-family:'Cormorant Garamond',serif;font-size:1.2rem}
    /* info banner when firebase not configured */
    .config-banner{background:linear-gradient(135deg,#fff8e1,#fff3cd);border-left:4px solid #f0a500;padding:14px 20px;margin-bottom:1.4rem;font-size:.82rem;color:#7a5c00;border-radius:0 4px 4px 0}
    .config-banner strong{display:block;margin-bottom:.3rem}
    .wa-btn{position:fixed;bottom:28px;right:28px;z-index:99;width:54px;height:54px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;text-decoration:none;box-shadow:0 6px 20px rgba(37,211,102,.4)}
    @media(max-width:900px){.catalog-layout{grid-template-columns:1fr}.sidebar{position:static}.filter-toggle{display:block}.sidebar-inner{display:none}.sidebar-inner.open{display:block}}
  </style>
</head>
<body>

<!-- Config compartida -->
<script src="firebase-config.js"></script>

<nav>
  <a href="index.html" class="nav-logo">Eres <span>Especial</span></a>
  <div class="nav-icons">
    <button>🔍</button>
    <button>♡</button>
    <button>🛍</button>
    <button onclick="location.href='login.html'">👤</button>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="index.html">Inicio</a> › Catálogo</div>
  <h1 class="page-title" id="pageTitle">Toda la colección</h1>
</div>

<div class="catalog-layout">
  <aside class="sidebar">
    <button class="filter-toggle" onclick="document.getElementById('sidebarInner').classList.toggle('open')">☰ Filtros</button>
    <div class="sidebar-inner" id="sidebarInner">
      <div class="filter-section">
        <div class="filter-title">Categorías</div>
        <div class="filter-options">
          <label><input type="radio" name="cat" value="" checked onchange="aplicarFiltros()"/> Todas</label>
          <label><input type="radio" name="cat" value="Vestidos" onchange="aplicarFiltros()"/> Vestidos</label>
          <label><input type="radio" name="cat" value="Blusas" onchange="aplicarFiltros()"/> Blusas</label>
          <label><input type="radio" name="cat" value="Pantalones" onchange="aplicarFiltros()"/> Pantalones</label>
          <label><input type="radio" name="cat" value="Conjuntos" onchange="aplicarFiltros()"/> Conjuntos</label>
          <label><input type="radio" name="cat" value="Faldas" onchange="aplicarFiltros()"/> Faldas</label>
          <label><input type="radio" name="cat" value="Accesorios" onchange="aplicarFiltros()"/> Accesorios</label>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Precio máximo</div>
        <div class="price-range">
          <input type="range" min="0" max="500000" value="500000" id="priceRange"
            oninput="document.getElementById('priceVal').textContent='$'+Number(this.value).toLocaleString('es-CO');aplicarFiltros()"/>
          <div class="price-labels"><span>$0</span><span id="priceVal">$500.000</span></div>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Tallas</div>
        <div class="size-grid" id="sizeFilters">
          <button class="size-btn" onclick="toggleSize(this,'XS')">XS</button>
          <button class="size-btn" onclick="toggleSize(this,'S')">S</button>
          <button class="size-btn" onclick="toggleSize(this,'M')">M</button>
          <button class="size-btn" onclick="toggleSize(this,'L')">L</button>
          <button class="size-btn" onclick="toggleSize(this,'XL')">XL</button>
          <button class="size-btn" onclick="toggleSize(this,'2XL')">2XL</button>
          <button class="size-btn" onclick="toggleSize(this,'3XL')">3XL</button>
        </div>
      </div>
      <button class="btn-clear" onclick="limpiarFiltros()">✕ Limpiar filtros</button>
    </div>
  </aside>

  <main>
    <div id="configBanner"></div>
    <div class="catalog-toolbar">
      <span class="result-count" id="resultCount">Cargando...</span>
      <div style="display:flex;gap:.8rem;align-items:center;flex-wrap:wrap">
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Cuadrícula">⊞</button>
          <button class="view-btn" id="listBtn" onclick="setView('list')" title="Lista">☰</button>
        </div>
        <select class="sort-select" id="sortSelect" onchange="aplicarFiltros()">
          <option value="newest">Más nuevos</option>
          <option value="price-asc">Menor precio</option>
          <option value="price-desc">Mayor precio</option>
        </select>
      </div>
    </div>
    <div class="prod-grid" id="productGrid">
      <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line short skeleton"></div></div>
      <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line short skeleton"></div></div>
      <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line short skeleton"></div></div>
      <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line short skeleton"></div></div>
      <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line short skeleton"></div></div>
      <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-line skeleton"></div><div class="skel-line short skeleton"></div></div>
    </div>
  </main>
</div>

<!-- WA desde config -->
<a id="waBtn" href="#" class="wa-btn" target="_blank">💬</a>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy, limit }
                            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── WhatsApp ──────────────────────────────────────────────
  const waNum = window.WA_NUMBER || "573207410290";
  document.getElementById('waBtn').href =
    `https://wa.me/${waNum}?text=Hola%2C%20me%20interesa%20un%20producto%20%F0%9F%8C%B8`;

  // ── Firebase config ───────────────────────────────────────
  const cfg     = window.FIREBASE_CONFIG;
  const cfgOk   = cfg && cfg.apiKey && !cfg.apiKey.includes('PEGA');
  const banner  = document.getElementById('configBanner');

  let db = null;
  if (cfgOk) {
    try {
      const app = initializeApp(cfg);
      db = getFirestore(app);
    } catch (e) { console.error('Firebase init:', e); }
  } else {
    banner.innerHTML = `<div class="config-banner">
      <strong>⚠️ Firebase no configurado</strong>
      Abre <code>firebase-config.js</code> y pega tu configuración de Firebase.
      Mientras tanto se muestran productos de ejemplo.
    </div>`;
  }

  // ── Estado ────────────────────────────────────────────────
  let todosLosProductos = [];
  let selectedSizes     = [];

  const params   = new URLSearchParams(window.location.search);
  const catUrl   = params.get('cat')   || '';
  const badgeUrl = params.get('badge') || '';

  if (catUrl) {
    const radio = document.querySelector(`input[value="${catUrl}"]`);
    if (radio) radio.checked = true;
    document.getElementById('pageTitle').textContent = catUrl;
  }

  // ── Cargar productos ──────────────────────────────────────
  async function cargarProductos() {
    if (!db) {
      todosLosProductos = productosEjemplo();
      aplicarFiltros();
      return;
    }
    try {
      // Intentar con orderBy primero (requiere índice en Firestore)
      let snap;
      try {
        snap = await getDocs(query(collection(db,'productos'), orderBy('creadoEn','desc')));
      } catch (_) {
        // Si no hay índice, cargar sin ordenar
        snap = await getDocs(collection(db,'productos'));
      }
      todosLosProductos = snap.docs.map(d => ({id:d.id,...d.data()}));
      if (todosLosProductos.length === 0) todosLosProductos = productosEjemplo();
    } catch (e) {
      console.warn('Firestore error:', e.message);
      todosLosProductos = productosEjemplo();
    }
    aplicarFiltros();
  }

  // ── Filtrar y renderizar ──────────────────────────────────
  window.aplicarFiltros = function() {
    const cat      = document.querySelector('input[name=cat]:checked')?.value || '';
    const maxPrice = parseInt(document.getElementById('priceRange').value);
    const sort     = document.getElementById('sortSelect').value;

    let res = todosLosProductos.filter(p => {
      if (cat && p.categoria !== cat)             return false;
      if (Number(p.precio) > maxPrice)            return false;
      if (badgeUrl && p.badge !== badgeUrl)       return false;
      if (selectedSizes.length > 0) {
        const t = Array.isArray(p.tallas) ? p.tallas : [];
        if (!selectedSizes.some(s => t.includes(s))) return false;
      }
      return true;
    });

    if (sort === 'price-asc')  res.sort((a,b) => Number(a.precio) - Number(b.precio));
    if (sort === 'price-desc') res.sort((a,b) => Number(b.precio) - Number(a.precio));

    renderProductos(res);
  };

  function renderProductos(lista) {
    const grid = document.getElementById('productGrid');
    document.getElementById('resultCount').textContent =
      `Mostrando ${lista.length} producto${lista.length!==1?'s':''}`;

    if (lista.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="e-icon">🌸</div><p>No encontramos productos con esos filtros.<br/>Prueba quitando algún filtro.</p></div>`;
      return;
    }
    grid.innerHTML = lista.map(p => {
      const img   = p.imagenUrl ? `<img src="${p.imagenUrl}" alt="${p.nombre}" loading="lazy"/>` : `<span class="placeholder">👗</span>`;
      const old   = p.precioAntes && Number(p.precioAntes)>0 ? `<s>$${Number(p.precioAntes).toLocaleString('es-CO')}</s>` : '';
      const badge = p.badge ? `<span class="prod-badge">${p.badge}</span>` : '';
      const tallas= Array.isArray(p.tallas) ? p.tallas.join(' · ') : (p.tallas||'');
      return `
        <div class="prod-card" onclick="location.href='producto.html?id=${p.id||''}'">
          <div class="prod-img">
            ${badge}
            <button class="prod-wish" onclick="event.stopPropagation();this.classList.toggle('active')">♡</button>
            ${img}
          </div>
          <div class="prod-info">
            <div class="prod-cat">${p.categoria||''}</div>
            <div class="prod-name">${p.nombre}</div>
            <div class="prod-sizes">Tallas: ${tallas||'—'}</div>
            <div class="prod-price">$${Number(p.precio).toLocaleString('es-CO')} ${old}</div>
            <button class="prod-add" onclick="event.stopPropagation()">Agregar al carrito</button>
          </div>
        </div>`;
    }).join('');
  }

  window.toggleSize = function(btn, size) {
    btn.classList.toggle('active');
    if (selectedSizes.includes(size)) selectedSizes = selectedSizes.filter(s=>s!==size);
    else selectedSizes.push(size);
    aplicarFiltros();
  };

  window.limpiarFiltros = function() {
    document.querySelector('input[value=""]').checked = true;
    document.getElementById('priceRange').value = 500000;
    document.getElementById('priceVal').textContent = '$500.000';
    selectedSizes = [];
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    aplicarFiltros();
  };

  window.setView = function(v) {
    document.getElementById('productGrid').classList.toggle('list-view', v==='list');
    document.getElementById('gridBtn').classList.toggle('active', v==='grid');
    document.getElementById('listBtn').classList.toggle('active', v==='list');
  };

  // ── Productos de ejemplo ──────────────────────────────────
  function productosEjemplo() {
    return [
      {id:'ej1',nombre:'Vestido Floral Rosa',  categoria:'Vestidos',  precio:85000,precioAntes:110000,tallas:['S','M','L','XL'],imagenUrl:'',badge:'Nuevo'},
      {id:'ej2',nombre:'Blusa Encaje Crema',   categoria:'Blusas',    precio:48000,precioAntes:0,     tallas:['XS','S','M'],   imagenUrl:'',badge:''},
      {id:'ej3',nombre:'Conjunto Lino Beige',  categoria:'Conjuntos', precio:95000,precioAntes:120000,tallas:['S','M','L'],    imagenUrl:'',badge:'Oferta'},
      {id:'ej4',nombre:'Vestido Midi Negro',   categoria:'Vestidos',  precio:72000,precioAntes:0,     tallas:['S','M','L','XL'],imagenUrl:'',badge:''},
      {id:'ej5',nombre:'Falda Plisada Rosa',   categoria:'Faldas',    precio:52000,precioAntes:0,     tallas:['XS','S','M'],   imagenUrl:'',badge:'Nuevo'},
      {id:'ej6',nombre:'Blusa Seda Champagne', categoria:'Blusas',    precio:65000,precioAntes:80000, tallas:['S','M','L'],    imagenUrl:'',badge:'Oferta'},
    ];
  }

  if (window.innerWidth > 900) document.getElementById('sidebarInner').classList.add('open');
  cargarProductos();
</script>
</body>
</html>
