<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi cuenta – Eres Especial</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#f5f0eb;--blush:#e8c4b8;--rose:#c4856a;--wine:#7a3d3d;--dark:#2a1a1a;--light:#faf7f4;--text:#4a3030;--gray:#9e8888}
    body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    nav{display:flex;align-items:center;justify-content:space-between;padding:18px 5%;background:rgba(250,247,244,.95);border-bottom:1px solid rgba(196,133,106,.2)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--wine);text-decoration:none}
    .nav-logo span{font-style:italic;font-weight:300}
    .auth-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(135deg,var(--cream) 0%,var(--blush) 100%)}
    .auth-card{background:#fff;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(122,61,61,.12)}
    .auth-tabs{display:flex}
    .auth-tab{flex:1;padding:18px;background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);border-bottom:2px solid var(--blush);transition:all .2s}
    .auth-tab.active{color:var(--wine);border-bottom-color:var(--wine);background:rgba(196,133,106,.04)}
    .auth-body{padding:36px}
    .auth-logo{text-align:center;margin-bottom:1.8rem}
    .auth-logo-text{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--wine)}
    .auth-logo-text span{font-style:italic}
    .auth-sub{font-size:.82rem;color:var(--gray);margin-top:.3rem}
    .form-group{margin-bottom:1.2rem}
    .form-group label{display:block;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text);margin-bottom:.5rem}
    .form-group input{width:100%;padding:12px 14px;border:1.5px solid var(--blush);background:var(--light);font-family:'Jost',sans-serif;font-size:.9rem;color:var(--text);transition:border-color .2s;outline:none}
    .form-group input:focus{border-color:var(--rose)}
    .form-group input::placeholder{color:var(--gray);font-size:.85rem}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .input-wrap{position:relative}
    .input-wrap input{padding-right:44px}
    .show-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray);font-size:.9rem}
    .show-pass:hover{color:var(--rose)}
    .forgot{text-align:right;margin-top:.4rem}
    .forgot a{font-size:.75rem;color:var(--rose);text-decoration:none}
    .btn-submit{width:100%;padding:14px;background:var(--wine);color:#fff;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;margin-top:1.4rem;transition:background .25s}
    .btn-submit:hover{background:var(--rose)}
    .btn-submit:disabled{background:var(--gray);cursor:not-allowed}
    .divider-or{display:flex;align-items:center;gap:1rem;margin:1.4rem 0;font-size:.72rem;color:var(--gray);letter-spacing:.1em}
    .divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--blush)}
    .btn-social{width:100%;padding:12px;background:none;border:1.5px solid var(--blush);cursor:pointer;font-family:'Jost',sans-serif;font-size:.82rem;color:var(--text);margin-bottom:.7rem;transition:border-color .2s;display:flex;align-items:center;justify-content:center;gap:.6rem}
    .btn-social:hover{border-color:var(--rose);color:var(--rose)}
    .terms{font-size:.72rem;color:var(--gray);line-height:1.6;margin-top:1.2rem;text-align:center}
    .terms a{color:var(--rose);text-decoration:none}
    .form-section{display:none}
    .form-section.active{display:block}
    .strength-bar{height:3px;background:var(--blush);margin-top:.5rem;border-radius:2px;overflow:hidden}
    .strength-fill{height:100%;width:0%;transition:width .3s,background .3s;background:var(--rose)}
    .error-msg{background:rgba(176,48,48,.08);border-left:3px solid #b03030;padding:10px 14px;font-size:.8rem;color:#b03030;margin-bottom:1rem;display:none}
    .error-msg.show{display:block}
    .success-msg{background:rgba(61,122,74,.08);border-left:3px solid #3d7a4a;padding:10px 14px;font-size:.8rem;color:#3d7a4a;margin-bottom:1rem;display:none}
    .success-msg.show{display:block}
    footer{padding:20px 5%;text-align:center;font-size:.75rem;color:var(--gray);background:rgba(250,247,244,.6)}
    footer a{color:var(--rose);text-decoration:none}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Eres <span>Especial</span></a>
  <a href="index.html" style="font-size:.78rem;color:var(--gray);text-decoration:none">← Volver a la tienda</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login',this)">Iniciar sesión</button>
      <button class="auth-tab" onclick="switchTab('registro',this)">Crear cuenta</button>
    </div>
    <div class="auth-body">
      <div class="auth-logo">
        <div class="auth-logo-text">Eres <span>Especial</span></div>
        <div class="auth-sub" id="authSub">Bienvenida de regreso 🌸</div>
      </div>

      <!-- ── LOGIN ── -->
      <div class="form-section active" id="loginForm">
        <div class="error-msg"   id="loginError"></div>
        <div class="success-msg" id="loginSuccess"></div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="tucorreo@email.com"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrap">
            <input type="password" id="loginPass" placeholder="Tu contraseña"/>
            <button class="show-pass" type="button" onclick="togglePass('loginPass',this)">👁</button>
          </div>
          <div class="forgot"><a href="#" onclick="resetPassword()">¿Olvidaste tu contraseña?</a></div>
        </div>
        <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Iniciar sesión</button>
        <div class="divider-or">o continúa con</div>
        <button class="btn-social" onclick="loginGoogle()">🔍 Continuar con Google</button>
      </div>

      <!-- ── REGISTRO ── -->
      <div class="form-section" id="registroForm">
        <div class="error-msg"   id="regError"></div>
        <div class="success-msg" id="regSuccess"></div>
        <div class="form-row">
          <div class="form-group"><label>Nombre</label><input type="text" id="regNombre" placeholder="Tu nombre"/></div>
          <div class="form-group"><label>Apellido</label><input type="text" id="regApellido" placeholder="Tu apellido"/></div>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="regEmail" placeholder="tucorreo@email.com"/>
        </div>
        <div class="form-group">
          <label>WhatsApp (opcional)</label>
          <input type="tel" id="regWa" placeholder="+57 300 000 0000"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrap">
            <input type="password" id="regPass" placeholder="Mínimo 8 caracteres" oninput="checkStrength(this.value)"/>
            <button class="show-pass" type="button" onclick="togglePass('regPass',this)">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <div class="input-wrap">
            <input type="password" id="regPass2" placeholder="Repite tu contraseña"/>
            <button class="show-pass" type="button" onclick="togglePass('regPass2',this)">👁</button>
          </div>
        </div>
        <button class="btn-submit" id="regBtn" onclick="handleRegister()">Crear mi cuenta</button>
        <p class="terms">Al registrarte aceptas nuestros <a href="#">Términos</a> y <a href="#">Política de privacidad</a>. Tus datos están protegidos 🔒</p>
      </div>
    </div>
  </div>
</div>

<footer>¿Necesitas ayuda? <a href="https://wa.me/1234567890">Escríbenos por WhatsApp</a> · © 2025 Eres Especial</footer>

<script type="module">
  import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import {
    getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup,
    updateProfile, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ══════════════════════════════════════════════════════
  //  ❶  PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE
  // ══════════════════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyC8mt3x7D3pcntULFReiUlENESAKx-L-kU",
  authDomain: "eres-especial.firebaseapp.com",
  projectId: "eres-especial",
  storageBucket: "eres-especial.firebasestorage.app",
  messagingSenderId: "1060245560689",
  appId: "1:1060245560689:web:57c9fcbff89469ccd2ead0"
  };
  // ══════════════════════════════════════════════════════

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Si ya está logueada → redirigir a inicio
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'index.html';
  });

  // ── Helpers UI ─────────────────────────────────────────
  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add('show');
  }
  function clearMsgs(prefix) {
    ['Error','Success'].forEach(s => {
      const el = document.getElementById(prefix + s);
      if (el) el.classList.remove('show');
    });
  }
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled  = loading;
    btn.textContent = loading ? 'Cargando…' : (btnId === 'loginBtn' ? 'Iniciar sesión' : 'Crear mi cuenta');
  }

  // ── LOGIN ───────────────────────────────────────────────
  window.handleLogin = async function() {
    clearMsgs('login');
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) { showError('loginError','Completa todos los campos'); return; }
    setLoading('loginBtn', true);
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      // onAuthStateChanged redirigirá automáticamente
    } catch (err) {
      const msgs = {
        'auth/user-not-found': 'No existe una cuenta con ese correo.',
        'auth/wrong-password': 'Contraseña incorrecta.',
        'auth/invalid-email':  'El correo no es válido.',
        'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
      };
      showError('loginError', msgs[err.code] || 'Error al iniciar sesión. Intenta de nuevo.');
      setLoading('loginBtn', false);
    }
  };

  // ── REGISTRO ────────────────────────────────────────────
  window.handleRegister = async function() {
    clearMsgs('reg');
    const nombre   = document.getElementById('regNombre').value.trim();
    const apellido = document.getElementById('regApellido').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const wa       = document.getElementById('regWa').value.trim();
    const pass     = document.getElementById('regPass').value;
    const pass2    = document.getElementById('regPass2').value;
    if (!nombre || !email || !pass) { showError('regError','Completa los campos obligatorios'); return; }
    if (pass.length < 8)   { showError('regError','La contraseña debe tener al menos 8 caracteres'); return; }
    if (pass !== pass2)    { showError('regError','Las contraseñas no coinciden'); return; }
    setLoading('regBtn', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      // Guardar nombre en Firebase Auth
      await updateProfile(cred.user, { displayName: nombre + ' ' + apellido });
      // Guardar perfil en Firestore
      await setDoc(doc(db, 'clientes', cred.user.uid), {
        nombre, apellido, email, whatsapp: wa,
        creadoEn: new Date().toISOString(), rol: 'cliente'
      });
      // onAuthStateChanged redirigirá
    } catch (err) {
      const msgs = {
        'auth/email-already-in-use': 'Ya existe una cuenta con ese correo.',
        'auth/invalid-email':        'El correo no es válido.',
        'auth/weak-password':        'La contraseña es muy débil.',
      };
      showError('regError', msgs[err.code] || 'Error al crear la cuenta. Intenta de nuevo.');
      setLoading('regBtn', false);
    }
  };

  // ── GOOGLE ──────────────────────────────────────────────
  window.loginGoogle = async function() {
    try {
      await signInWithPopup(auth, provider);
      // onAuthStateChanged redirigirá
    } catch (err) {
      showError('loginError', 'No se pudo iniciar sesión con Google.');
    }
  };

  // ── RECUPERAR CONTRASEÑA ────────────────────────────────
  window.resetPassword = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) { showError('loginError','Escribe tu correo primero'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      const el = document.getElementById('loginSuccess');
      el.textContent = '✓ Te enviamos un correo para restablecer tu contraseña.';
      el.classList.add('show');
    } catch (_) {
      showError('loginError','No encontramos ese correo.');
    }
  };

  // ── HELPERS UI globales ─────────────────────────────────
  window.switchTab = function(section, btn) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(section+'Form').classList.add('active');
    document.getElementById('authSub').textContent =
      section === 'login' ? 'Bienvenida de regreso 🌸' : 'Únete a nuestra comunidad 🌺';
  };

  window.togglePass = function(id, btn) {
    const inp = document.getElementById(id);
    inp.type  = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  };

  window.checkStrength = function(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const fill = document.getElementById('strengthFill');
    const colors = ['#e8c4b8','#c4856a','#a0602a','#4a7a3d'];
    fill.style.width  = (score * 25) + '%';
    fill.style.background = colors[score-1] || 'var(--blush)';
  };
</script>
</body>
</html>
