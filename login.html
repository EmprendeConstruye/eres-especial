<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi cuenta – Eres Especial</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#f5f0eb;--blush:#e8c4b8;--rose:#c4856a;--wine:#7a3d3d;--dark:#2a1a1a;--light:#faf7f4;--text:#4a3030;--gray:#9e8888;--green:#3d7a4a}
    body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    nav{display:flex;align-items:center;justify-content:space-between;padding:16px 5%;background:rgba(250,247,244,.95);border-bottom:1px solid rgba(196,133,106,.2)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--wine);text-decoration:none}
    .nav-logo span{font-style:italic;font-weight:300}
    .back{font-size:.78rem;color:var(--gray);text-decoration:none}
    .back:hover{color:var(--rose)}
    .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:36px 20px;background:linear-gradient(135deg,var(--cream),var(--blush))}
    .card{background:#fff;width:100%;max-width:456px;box-shadow:0 20px 56px rgba(122,61,61,.12)}
    .tabs{display:flex}
    .tab{flex:1;padding:17px;background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);border-bottom:2px solid var(--blush);transition:all .2s}
    .tab.on{color:var(--wine);border-bottom-color:var(--wine);background:rgba(196,133,106,.04)}
    .body{padding:34px}
    .logo-txt{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:300;color:var(--wine);text-align:center}
    .logo-txt span{font-style:italic}
    .sub-txt{font-size:.8rem;color:var(--gray);text-align:center;margin-top:.3rem;margin-bottom:1.7rem}
    .fg{margin-bottom:1.1rem}
    .fg label{display:block;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text);margin-bottom:.4rem}
    .fg input{width:100%;padding:11px 13px;border:1.5px solid var(--blush);background:var(--light);font-family:'Jost',sans-serif;font-size:.88rem;color:var(--text);outline:none;transition:border-color .2s}
    .fg input:focus{border-color:var(--rose)}
    .fg input::placeholder{color:var(--gray)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
    .inp-wrap{position:relative}
    .inp-wrap input{padding-right:42px}
    .eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray);font-size:.88rem}
    .forgot{text-align:right;margin-top:.35rem}
    .forgot a{font-size:.73rem;color:var(--rose);text-decoration:none}
    .btn-sub{width:100%;padding:13px;background:var(--wine);color:#fff;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;margin-top:1.3rem;transition:background .25s}
    .btn-sub:hover{background:var(--rose)}
    .btn-sub:disabled{background:var(--gray);cursor:not-allowed}
    .divider{display:flex;align-items:center;gap:.9rem;margin:1.3rem 0;font-size:.7rem;color:var(--gray);letter-spacing:.1em}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--blush)}
    .btn-soc{width:100%;padding:11px;background:none;border:1.5px solid var(--blush);cursor:pointer;font-family:'Jost',sans-serif;font-size:.8rem;color:var(--text);margin-bottom:.6rem;transition:border-color .2s;display:flex;align-items:center;justify-content:center;gap:.6rem}
    .btn-soc:hover{border-color:var(--rose);color:var(--rose)}
    .terms{font-size:.7rem;color:var(--gray);line-height:1.6;margin-top:1.1rem;text-align:center}
    .terms a{color:var(--rose);text-decoration:none}
    .fs{display:none}
    .fs.on{display:block}
    .strbar{height:3px;background:var(--blush);margin-top:.45rem;border-radius:2px;overflow:hidden}
    .strfill{height:100%;width:0%;transition:width .3s,background .3s}
    .msg{padding:9px 13px;font-size:.78rem;margin-bottom:.9rem;display:none;border-left:3px solid}
    .msg.on{display:block}
    .msg.err{background:rgba(176,48,48,.07);border-color:#b03030;color:#b03030}
    .msg.ok{background:rgba(61,122,74,.07);border-color:var(--green);color:var(--green)}
    footer{padding:18px 5%;text-align:center;font-size:.73rem;color:var(--gray);background:rgba(250,247,244,.6)}
    footer a{color:var(--rose);text-decoration:none}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Eres <span>Especial</span></a>
  <a href="index.html" class="back">← Volver a la tienda</a>
</nav>

<div class="wrap">
  <div class="card">
    <div class="tabs">
      <button class="tab on" onclick="cambiarTab('login',this)">Iniciar sesión</button>
      <button class="tab"    onclick="cambiarTab('reg',this)">Crear cuenta</button>
    </div>
    <div class="body">
      <div class="logo-txt">Eres <span>Especial</span></div>
      <div class="sub-txt" id="subTxt">Bienvenida de regreso 🌸</div>

      <!-- LOGIN -->
      <div class="fs on" id="loginFs">
        <div class="msg err" id="loginErr"></div>
        <div class="msg ok"  id="loginOk"></div>
        <div class="fg"><label>Correo electrónico</label><input type="email" id="lEmail" placeholder="tucorreo@email.com"/></div>
        <div class="fg"><label>Contraseña</label>
          <div class="inp-wrap">
            <input type="password" id="lPass" placeholder="Tu contraseña"/>
            <button class="eye" type="button" onclick="verPass('lPass',this)">👁</button>
          </div>
          <div class="forgot"><a href="#" onclick="resetPass();return false">¿Olvidaste tu contraseña?</a></div>
        </div>
        <button class="btn-sub" id="lBtn" onclick="doLogin()">Iniciar sesión</button>
        <div class="divider">o</div>
        <button class="btn-soc" onclick="googleLogin()">🔍 Continuar con Google</button>
      </div>

      <!-- REGISTRO -->
      <div class="fs" id="regFs">
        <div class="msg err" id="regErr"></div>
        <div class="msg ok"  id="regOk"></div>
        <div class="row2">
          <div class="fg"><label>Nombre</label><input type="text" id="rNom" placeholder="Tu nombre"/></div>
          <div class="fg"><label>Apellido</label><input type="text" id="rApe" placeholder="Tu apellido"/></div>
        </div>
        <div class="fg"><label>Correo electrónico</label><input type="email" id="rEmail" placeholder="tucorreo@email.com"/></div>
        <div class="fg"><label>WhatsApp (opcional)</label><input type="tel" id="rWa" placeholder="+57 300 000 0000"/></div>
        <div class="fg"><label>Contraseña</label>
          <div class="inp-wrap">
            <input type="password" id="rPass" placeholder="Mínimo 8 caracteres" oninput="checkStr(this.value)"/>
            <button class="eye" type="button" onclick="verPass('rPass',this)">👁</button>
          </div>
          <div class="strbar"><div class="strfill" id="strF"></div></div>
        </div>
        <div class="fg"><label>Confirmar contraseña</label>
          <div class="inp-wrap">
            <input type="password" id="rPass2" placeholder="Repite tu contraseña"/>
            <button class="eye" type="button" onclick="verPass('rPass2',this)">👁</button>
          </div>
        </div>
        <button class="btn-sub" id="rBtn" onclick="doReg()">Crear mi cuenta</button>
        <p class="terms">Al registrarte aceptas nuestros <a href="#">Términos</a> y <a href="#">Política de privacidad</a>. 🔒</p>
      </div>
    </div>
  </div>
</div>

<footer>¿Necesitas ayuda? <a href="https://wa.me/573207410290">Escríbenos por WhatsApp</a> · © 2025 Eres Especial</footer>

<script type="module">
  import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup,
    updateProfile, onAuthStateChanged }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  /* ╔══════════════════════════════════════════════════════╗
     ║  ⚠️  PEGA TU CONFIGURACIÓN DE FIREBASE AQUÍ         ║
     ╚══════════════════════════════════════════════════════╝ */
  const FB = {
    apiKey: "AIzaSyC8mt3x7D3pcntULFReiUlENESAKx-L-kU",
  authDomain: "eres-especial.firebaseapp.com",
  projectId: "eres-especial",
  //storageBucket: "eres-especial.firebasestorage.app",
  messagingSenderId: "1060245560689",
  appId: "1:1060245560689:web:57c9fcbff89469ccd2ead0"
  };

  const cfgOk = FB.apiKey && !FB.apiKey.includes('PEGA');
  let auth = null, db = null;

  if (cfgOk) {
    try {
      const app = initializeApp(FB);
      auth = getAuth(app);
      db   = getFirestore(app);
      // Si ya hay sesión activa → redirigir
      onAuthStateChanged(auth, u => { if (u) location.href = 'index.html'; });
    } catch(e) { console.error(e); }
  }

  /* ─ HELPERS ─────────────────────────────────────────── */
  function showMsg(id, txt, tipo) {
    const el = document.getElementById(id);
    el.textContent = txt; el.className = 'msg ' + tipo + ' on';
  }
  function hideMsg(prefix) {
    ['Err','Ok'].forEach(s => {
      const el = document.getElementById(prefix + s);
      if (el) el.classList.remove('on');
    });
  }
  function setLoad(id, on, txt) {
    const b = document.getElementById(id);
    b.disabled = on; b.textContent = on ? 'Cargando…' : txt;
  }
  function noFb() { alert('⚠️ Firebase no está configurado todavía.\nAbre el archivo en VS Code y pega tu configuración.'); }

  /* ─ LOGIN ───────────────────────────────────────────── */
  window.doLogin = async function() {
    if (!auth) { noFb(); return; }
    hideMsg('login');
    const email = document.getElementById('lEmail').value.trim();
    const pass  = document.getElementById('lPass').value;
    if (!email || !pass) { showMsg('loginErr','Completa todos los campos','err'); return; }
    setLoad('lBtn', true, 'Iniciar sesión');
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      // onAuthStateChanged redirigirá automáticamente
    } catch(e) {
      const m = {
        'auth/user-not-found':     'No existe cuenta con ese correo.',
        'auth/wrong-password':     'Contraseña incorrecta.',
        'auth/invalid-credential': 'Correo o contraseña incorrectos.',
        'auth/too-many-requests':  'Demasiados intentos. Espera un momento.'
      };
      showMsg('loginErr', m[e.code] || 'Error al iniciar sesión.', 'err');
      setLoad('lBtn', false, 'Iniciar sesión');
    }
  };

  /* ─ REGISTRO ────────────────────────────────────────── */
  window.doReg = async function() {
    if (!auth) { noFb(); return; }
    hideMsg('reg');
    const nom  = document.getElementById('rNom').value.trim();
    const ape  = document.getElementById('rApe').value.trim();
    const email= document.getElementById('rEmail').value.trim();
    const wa   = document.getElementById('rWa').value.trim();
    const pass = document.getElementById('rPass').value;
    const pass2= document.getElementById('rPass2').value;
    if (!nom || !email || !pass) { showMsg('regErr','Completa los campos obligatorios','err'); return; }
    if (pass.length < 8)  { showMsg('regErr','Contraseña mínimo 8 caracteres','err'); return; }
    if (pass !== pass2)   { showMsg('regErr','Las contraseñas no coinciden','err'); return; }
    setLoad('rBtn', true, 'Crear mi cuenta');
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: `${nom} ${ape}`.trim() });
      if (db) {
        await setDoc(doc(db,'clientes', cred.user.uid), {
          nombre:nom, apellido:ape, email, whatsapp:wa,
          creadoEn: new Date().toISOString(), rol:'cliente'
        });
      }
      // onAuthStateChanged redirigirá
    } catch(e) {
      const m = {
        'auth/email-already-in-use':'Ya existe una cuenta con ese correo.',
        'auth/weak-password':       'Contraseña muy débil.'
      };
      showMsg('regErr', m[e.code] || 'Error al crear la cuenta.', 'err');
      setLoad('rBtn', false, 'Crear mi cuenta');
    }
  };

  /* ─ GOOGLE ──────────────────────────────────────────── */
  window.googleLogin = async function() {
    if (!auth) { noFb(); return; }
    try { await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e) { showMsg('loginErr','No se pudo iniciar sesión con Google.','err'); }
  };

  /* ─ RESET CONTRASEÑA ────────────────────────────────── */
  window.resetPass = async function() {
    if (!auth) { noFb(); return; }
    const email = document.getElementById('lEmail').value.trim();
    if (!email) { showMsg('loginErr','Escribe tu correo primero','err'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg('loginOk','✓ Correo de recuperación enviado.','ok');
    } catch(_) { showMsg('loginErr','No encontramos ese correo.','err'); }
  };

  /* ─ HELPERS UI ──────────────────────────────────────── */
  window.cambiarTab = function(sec, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.fs').forEach(f => f.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById(sec + 'Fs').classList.add('on');
    document.getElementById('subTxt').textContent =
      sec === 'login' ? 'Bienvenida de regreso 🌸' : 'Únete a nuestra comunidad 🌺';
  };

  window.verPass = function(id, btn) {
    const i = document.getElementById(id);
    i.type = i.type === 'password' ? 'text' : 'password';
    btn.textContent = i.type === 'password' ? '👁' : '🙈';
  };

  window.checkStr = function(v) {
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const f = document.getElementById('strF');
    f.style.width = (s*25) + '%';
    f.style.background = ['#e8c4b8','#c4856a','#a0602a','#3d7a4a'][s-1] || 'var(--blush)';
  };
</script>
</body>
</html>
